included:
  - RandomUserCodingChallenge

excluded:
  - RandomUserCodingChallengeTests
  - RandomUserCodingChallengeUITests

opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - extension_access_modifier
  - first_where
  - flatmap_over_map_reduce
  - implicit_return
  - joined_default_parameter
  - last_where
  - lower_acl_than_parent
  - modifier_order
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - shorthand_optional_binding
  - sorted_imports
  - toggle_bool
  - vertical_whitespace_between_cases
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

disabled_rules:
  - redundant_type_annotation  # project prefers explicit type declarations
  - trailing_comma             # SwiftFormat owns this rule (--trailingcommas always)

line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_comments: true

file_length:
  warning: 300
  error: 400

type_body_length:
  warning: 200
  error: 300

function_body_length:
  warning: 50
  error: 80

cyclomatic_complexity:
  warning: 10
  error: 15

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
